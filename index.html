<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Open Course in Irish Taxation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: var(--paper); color: var(--ink); }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; }
  @keyframes marq {
    from { transform: translateX(0); }
    to { transform: translateX(-33.333%); }
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: oklch(0.86 0.012 85);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: oklch(0.32 0.05 145);
    cursor: pointer;
    border: 3px solid oklch(0.985 0.005 90);
    box-shadow: 0 0 0 1px oklch(0.32 0.05 145);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: oklch(0.32 0.05 145);
    cursor: pointer;
    border: 3px solid oklch(0.985 0.005 90);
  }
</style>
</head>
<body class="itx">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="app-pages.jsx"></script>

<script type="text/babel">
const { useState: useS, useEffect: useE } = React;

function useViewport() {
  const [w, setW] = useS(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useE(() => {
    const onR = () => setW(window.innerWidth);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  return w < 760;
}

function App() {
  const { route, go } = useRoute();
  const progress = useProgress();
  const isMobile = useViewport();
  const [menuOpen, setMenuOpen] = useS(false);

  let content;
  if (route.name === 'home') content = <HomePage go={go} isMobile={isMobile} progress={progress} />;
  else if (route.name === 'curriculum') content = <CurriculumPage go={go} isMobile={isMobile} progress={progress} />;
  else if (route.name === 'calculator') content = <CalculatorPage go={go} isMobile={isMobile} />;
  else if (route.name === 'about') content = <AboutPage go={go} isMobile={isMobile} />;
  else if (route.name === 'week') content = <WeekPage go={go} isMobile={isMobile} weekNum={route.n} progress={progress} />;

  return (
    <div className="itx">
      <Nav go={go} route={route} isMobile={isMobile} onMenuToggle={() => setMenuOpen(true)} />
      <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)} go={go} />
      {content}
      {route.name !== 'home' && <Footer isMobile={isMobile} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
